<svg viewBox="0 0 850 1100" width="850" height="1100" xmlns="http://www.w3.org/2000/svg">
<title>tactile-graph-paper</title>

<!-- Tactile graph paper starter for a Letter-size page. -->
<!-- Change the spacing or stroke weight to match your embossing needs. -->

<rect x="50" y="50" width="750" height="1000" stroke="black" stroke-width="4" fill="none" />

<!-- Vertical grid lines -->
<line x1="100" y1="50" x2="100" y2="1050" stroke="black" stroke-width="2" />
<line x1="150" y1="50" x2="150" y2="1050" stroke="black" stroke-width="2" />
<line x1="200" y1="50" x2="200" y2="1050" stroke="black" stroke-width="2" />
<line x1="250" y1="50" x2="250" y2="1050" stroke="black" stroke-width="2" />
<line x1="300" y1="50" x2="300" y2="1050" stroke="black" stroke-width="2" />
<line x1="350" y1="50" x2="350" y2="1050" stroke="black" stroke-width="2" />
<line x1="400" y1="50" x2="400" y2="1050" stroke="black" stroke-width="2" />
<line x1="450" y1="50" x2="450" y2="1050" stroke="black" stroke-width="2" />
<line x1="500" y1="50" x2="500" y2="1050" stroke="black" stroke-width="2" />
<line x1="550" y1="50" x2="550" y2="1050" stroke="black" stroke-width="2" />
<line x1="600" y1="50" x2="600" y2="1050" stroke="black" stroke-width="2" />
<line x1="650" y1="50" x2="650" y2="1050" stroke="black" stroke-width="2" />
<line x1="700" y1="50" x2="700" y2="1050" stroke="black" stroke-width="2" />
<line x1="750" y1="50" x2="750" y2="1050" stroke="black" stroke-width="2" />

<!-- Horizontal grid lines -->
<line x1="50" y1="100" x2="800" y2="100" stroke="black" stroke-width="2" />
<line x1="50" y1="150" x2="800" y2="150" stroke="black" stroke-width="2" />
<line x1="50" y1="200" x2="800" y2="200" stroke="black" stroke-width="2" />
<line x1="50" y1="250" x2="800" y2="250" stroke="black" stroke-width="2" />
<line x1="50" y1="300" x2="800" y2="300" stroke="black" stroke-width="2" />
<line x1="50" y1="350" x2="800" y2="350" stroke="black" stroke-width="2" />
<line x1="50" y1="400" x2="800" y2="400" stroke="black" stroke-width="2" />
<line x1="50" y1="450" x2="800" y2="450" stroke="black" stroke-width="2" />
<line x1="50" y1="500" x2="800" y2="500" stroke="black" stroke-width="2" />
<line x1="50" y1="550" x2="800" y2="550" stroke="black" stroke-width="2" />
<line x1="50" y1="600" x2="800" y2="600" stroke="black" stroke-width="2" />
<line x1="50" y1="650" x2="800" y2="650" stroke="black" stroke-width="2" />
<line x1="50" y1="700" x2="800" y2="700" stroke="black" stroke-width="2" />
<line x1="50" y1="750" x2="800" y2="750" stroke="black" stroke-width="2" />
<line x1="50" y1="800" x2="800" y2="800" stroke="black" stroke-width="2" />
<line x1="50" y1="850" x2="800" y2="850" stroke="black" stroke-width="2" />
