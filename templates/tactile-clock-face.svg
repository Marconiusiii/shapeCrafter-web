<svg viewBox="0 0 850 1100" width="850" height="1100" xmlns="http://www.w3.org/2000/svg">
<title>Tactile clock face</title>

<rect id="background" x="0" y="0" width="100%" height=
100%" fill="white"/>

<!-- "Let's tell the time!" in braille -->
<text x="425" y="125" text-anchor="middle" fill="black" font-family="Braille29" font-size="29pt">⠠⠇⠑⠞⠄⠎ ⠞⠑⠇⠇ ⠮ ⠐⠞⠖</text>

<!-- Tactile clock face starter. -->
<!-- The hands use rotation transforms around the clock center. -->

<circle id="clockFace" cx="425" cy="510" r="320" stroke="black" stroke-width="8" fill="none" />
<circle id="clockCenter" cx="425" cy="510" r="24" fill="black" />

<!-- Clock hands -->
<line id="hourHand" x1="425" y1="510" x2="425" y2="290" stroke="black" stroke-width="16" stroke-linecap="round" transform="rotate(35 425 510)" />
<line id="minuteHand" x1="425" y1="510" x2="425" y2="220" stroke="black" stroke-width="8" transform="rotate(300 425 510)" />

<!-- Clock numbers -->
<text id="number12" x="425" y="225" text-anchor="middle" dominant-baseline="middle" font-family="Avenir, Arial, sans-serif" font-size="68pt" fill="black">12</text>
<text id="number1" x="565" y="265" text-anchor="middle" dominant-baseline="middle" font-family="Avenir, Arial, sans-serif" font-size="68pt" fill="black">1</text>
<text id="number2" x="655" y="355" text-anchor="middle" dominant-baseline="middle" font-family="Avenir, Arial, sans-serif" font-size="68pt" fill="black">2</text>
<text id="number3" x="690" y="510" text-anchor="middle" dominant-baseline="middle" font-family="Avenir, Arial, sans-serif" font-size="68pt" fill="black">3</text>
<text id="number4" x="655" y="665" text-anchor="middle" dominant-baseline="middle" font-family="Avenir, Arial, sans-serif" font-size="68pt" fill="black">4</text>
<text id="number5" x="565" y="755" text-anchor="middle" dominant-baseline="middle" font-family="Avenir, Arial, sans-serif" font-size="68pt" fill="black">5</text>
<text id="number6" x="425" y="795" text-anchor="middle" dominant-baseline="middle" font-family="Avenir, Arial, sans-serif" font-size="68pt" fill="black">6</text>
<text id="number7" x="285" y="755" text-anchor="middle" dominant-baseline="middle" font-family="Avenir, Arial, sans-serif" font-size="68pt" fill="black">7</text>
<text id="number8" x="195" y="665" text-anchor="middle" dominant-baseline="middle" font-family="Avenir, Arial, sans-serif" font-size="68pt" fill="black">8</text>
<text id="number9" x="160" y="510" text-anchor="middle" dominant-baseline="middle" font-family="Avenir, Arial, sans-serif" font-size="68pt" fill="black">9</text>
<text id="number10" x="205" y="355" text-anchor="middle" dominant-baseline="middle" font-family="Avenir, Arial, sans-serif" font-size="68pt" fill="black">10</text>
<text id="number11" x="285" y="265" text-anchor="middle" dominant-baseline="middle" font-family="Avenir, Arial, sans-serif" font-size="68pt" fill="black">11</text>

</svg>
